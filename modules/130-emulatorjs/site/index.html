<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0b0f1a" />
  <title>Arcade · Home Server</title>
  <style>
    :root{--bg:#0b0f1a;--card:#141a2b;--card2:#1b2338;--ink:#e6ecff;--mut:#8a97c2;
      --neon:#00e5ff;--neon2:#b45cff;--pink:#ff4d8d;--line:rgba(255,255,255,.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);
      min-height:100vh;background:
        radial-gradient(800px 500px at 15% -10%,rgba(0,229,255,.18),transparent 60%),
        radial-gradient(800px 500px at 110% 0%,rgba(180,92,255,.18),transparent 55%),
        var(--bg);}
    .wrap{max-width:1000px;margin:0 auto;padding:32px 18px 60px}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
    h1{font-size:26px;letter-spacing:.5px}
    h1 .g{background:linear-gradient(90deg,var(--neon),var(--neon2));-webkit-background-clip:text;background-clip:text;color:transparent}
    .sub{color:var(--mut);font-size:13px;margin-top:2px}
    .count{color:var(--neon);font-weight:700}
    .search{margin:18px 0;width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;
      color:var(--ink);font-size:15px;padding:13px 15px;outline:none}
    .search:focus{border-color:var(--neon)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
    .game{display:flex;flex-direction:column;text-decoration:none;color:inherit;background:var(--card);
      border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:.16s;cursor:pointer}
    .game:hover{transform:translateY(-4px);border-color:var(--neon);box-shadow:0 10px 30px rgba(0,229,255,.18)}
    .art{position:relative;height:120px;background:linear-gradient(135deg,var(--card2),#0e1424);overflow:hidden}
    .art .ltr{position:absolute;inset:0;display:grid;place-items:center;font-size:36px;font-weight:800;color:#4b5a86;letter-spacing:1px}
    .art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:#0e1424}
    .info{padding:11px 12px}
    .nm{font-size:13.5px;font-weight:600;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .sys{margin-top:6px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--neon2);font-weight:700}
    .empty{color:var(--mut);text-align:center;padding:40px 0;line-height:1.7}
    footer{margin-top:30px;color:#5a678f;font-size:12px;text-align:center;line-height:1.7}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>🕹️ <span class="g">Arcade</span></h1>
        <div class="sub"><span class="count" id="count">0</span> free homebrew games · runs in your browser</div>
      </div>
    </header>
    <input class="search" id="search" placeholder="Search games…" autocomplete="off" />
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden></div>
    <footer>
      Powered by EmulatorJS · homebrew &amp; public-domain ROMs only.<br/>
      Add more under <code>~/emulatorjs/library/roms/&lt;system&gt;/</code> and re-run the module.
    </footer>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const emptyEl = document.getElementById('empty');
    let all = [];
    const key = (g) => (g.title[0] || '?').toUpperCase();

    function render(list) {
      document.getElementById('count').textContent = all.length;
      emptyEl.hidden = list.length > 0;
      grid.innerHTML = list.map((g) => {
        const url = `play.html?core=${encodeURIComponent(g.core)}&rom=${encodeURIComponent(g.rom)}&title=${encodeURIComponent(g.title)}`;
        // box art sits over a lettermark; if it fails to load, remove it and the letter shows through
        const art = g.art ? `<img src="library/${g.art}" alt="" loading="lazy" onerror="this.remove()">` : '';
        return `<a class="game" href="${url}">
          <div class="art"><span class="ltr">${key(g)}</span>${art}</div>
          <div class="info"><div class="nm">${g.title}</div><div class="sys">${g.system}</div></div>
        </a>`;
      }).join('');
    }

    fetch('library/games.json')
      .then((r) => r.json())
      .then((d) => { all = (d.games || []).sort((a, b) => a.title.localeCompare(b.title)); render(all); })
      .catch(() => { emptyEl.hidden = false; emptyEl.textContent = 'Could not load the game library.'; });

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      render(!q ? all : all.filter((g) => g.title.toLowerCase().includes(q)));
    });
  </script>
</body>
</html>
