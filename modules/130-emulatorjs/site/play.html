<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#000000" />
  <title>Playing…</title>
  <style>
    html,body{margin:0;height:100%;background:#000;color:#e6ecff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    .bar{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#0b0f1a;border-bottom:1px solid rgba(255,255,255,.08)}
    .bar a{color:#00e5ff;text-decoration:none;font-weight:700;font-size:14px}
    .bar .t{color:#8a97c2;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #game{width:100%;height:calc(100% - 45px)}
  </style>
</head>
<body>
  <div class="bar"><a href="index.html">← Library</a><span class="t" id="title"></span></div>
  <div id="game"></div>
  <script>
    const p = new URLSearchParams(location.search);
    const title = p.get('title') || 'Game';
    document.getElementById('title').textContent = title;
    document.title = title;
    window.EJS_player = '#game';
    window.EJS_core = p.get('core') || 'nes';
    window.EJS_gameUrl = 'library/' + p.get('rom');
    window.EJS_gameName = title;
    window.EJS_startOnLoaded = true;
    window.EJS_color = '#00e5ff';
    // Engine + WASM cores are self-hosted on the Pi → fully offline, no CDN.
    window.EJS_pathtodata = 'data/';
  </script>
  <script src="data/loader.js"></script>
</body>
</html>
