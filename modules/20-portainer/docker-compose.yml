# Portainer CE — web dashboard for observing Docker (containers, logs, stats).
# Source of truth lives HERE in git, not in Portainer's UI. Use it to monitor;
# define services as committed compose files, not as Portainer-managed stacks.
services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9443:9443"   # HTTPS web UI
      - "8000:8000"   # Edge agent tunnel (optional)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data

volumes:
  portainer_data:
