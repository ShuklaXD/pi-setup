# Dashy — a single landing page linking all the services on this Pi.
# The dashboard layout (conf.yml) is committed alongside this file.
services:
  dashy:
    image: lissy93/dashy:latest
    container_name: dashy
    restart: unless-stopped
    volumes:
      # Committed dashboard config (this module's directory).
      - ${DASHY_CONF:-./conf.yml}:/app/user-data/conf.yml
    ports:
      - "4000:8080"
    environment:
      - NODE_ENV=production
