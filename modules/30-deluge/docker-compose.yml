# Deluge behind a PIA VPN (gluetun). gluetun owns the network + kill-switch;
# Deluge shares gluetun's network namespace, so ALL Deluge traffic exits through
# the VPN and is blocked if the tunnel drops. Deluge's ports are therefore
# published on the gluetun container, not on deluge.
#
# Secrets (PIA user/password) come from a gitignored .env in this directory.
# Paths/IDs are injected by install.sh; defaults keep standalone `up` working.
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${PIA_USER:?set PIA_USER in modules/30-deluge/.env}
      - OPENVPN_PASSWORD=${PIA_PASSWORD:?set PIA_PASSWORD in modules/30-deluge/.env}
      - SERVER_REGIONS=${PIA_REGION:-Singapore}
      # Allow LAN clients to reach the published web UI through the killswitch.
      - FIREWALL_OUTBOUND_SUBNETS=${LAN_SUBNET:-10.75.12.0/24}
      - TZ=${TZ:-Asia/Kolkata}
    ports:
      - "8112:8112"        # Deluge web UI (shares this netns)
      - "58846:58846"      # Deluge daemon RPC (thin/desktop clients)
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  deluge:
    image: lscr.io/linuxserver/deluge:latest
    container_name: deluge
    restart: unless-stopped
    # Route all of Deluge's traffic through the VPN container.
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Kolkata}
      - DELUGE_LOGLEVEL=error
    volumes:
      - ${APPDATA:-/home/shukks/appdata}/deluge:/config
      - ${DOWNLOADS:-/home/shukks/downloads}:/downloads
    # No `ports:` here — Deluge shares gluetun's network namespace, so its ports
    # are published on the gluetun service above.
